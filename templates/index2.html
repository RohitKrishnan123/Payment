<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fintech Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>Make a Payment</h2>
        <form id="payment-form">
            <div class="input-group">
                <i class="fas fa-credit-card"></i>
                <input type="text" id="card_number" placeholder="Card Number" maxlength="16" required />
            </div>
            <div class="input-group">
                <i class="fas fa-calendar-alt"></i>
                <input type="text" id="expiry" placeholder="MM/YY" required />
            </div>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="text" id="cvv" placeholder="CVV" maxlength="3" required />
            </div>
            <div class="input-group">
                <i class="fas fa-dollar-sign"></i>
                <input type="number" id="amount" placeholder="Amount ($)" required />
            </div>
            <button type="submit">Pay Now</button>
        </form>
        <div id="payment-response"></div>
    </div>
    <script src="{{ url_for('static', filename='script2.js') }}"></script>
</body>
</html>
